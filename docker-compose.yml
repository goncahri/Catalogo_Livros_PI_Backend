version: '3.9'

services:

  mongodb:
    image: mongo:7
    container_name: catalogo-mongodb
    restart: always

    ports:
      - "27017:27017"

    volumes:
      - mongodb_data:/data/db


  backend:
    build: .

    container_name: catalogo-backend

    restart: always

    ports:
      - "3000:3000"

    env_file:
      - .env

    depends_on:
      - mongodb


volumes:
  mongodb_data:
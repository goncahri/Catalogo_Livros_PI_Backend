name: CI Backend

on:
  push:
    branches:
      - develop
      - main
      - "feature/**"
  pull_request:
    branches:
      - develop
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      MONGO_URI: ${{ secrets.MONGO_URI }}
      DB_NAME: ${{ secrets.DB_NAME }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      EXPIRES_IN: ${{ secrets.EXPIRES_IN }}
      SENHA_USUARIO: ${{ secrets.SENHA_USUARIO }}
      DOCKER_IMAGE: goncahri/catalogo-livros-backend

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm install

      - name: Subir API em background
        run: npm start &

      - name: Esperar API ficar disponível
        run: npx wait-on http://localhost:3000

      - name: Rodar testes
        run: npm test

      - name: Login no Docker Hub
        if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configurar Docker Buildx
        if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')
        uses: docker/setup-buildx-action@v3

      - name: Build e push da imagem HML
        if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:hml
            ${{ env.DOCKER_IMAGE }}:develop

      - name: Trigger deploy Render HML
        if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
        run: curl -X POST ${{ secrets.RENDER_HML_DEPLOY_HOOK }}

      - name: Rodar semantic-release
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx semantic-release

      - name: Obter versão gerada
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: version
        run: |
          git fetch --tags
          VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build e push da imagem PROD
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.DOCKER_IMAGE }}:latest

      - name: Trigger deploy Render PROD
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: curl -X POST ${{ secrets.RENDER_PROD_DEPLOY_HOOK }}